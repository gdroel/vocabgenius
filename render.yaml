services:
  - type: web
    name: pipserver
    runtime: python
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: python3 appstore_notification_listener.py
    healthCheckPath: /healthz
    envVars:
      # Render Postgres connection string. Paste the database's Internal
      # Database URL here (Render dashboard -> service -> Environment).
      - key: DATABASE_URL
        sync: false
      # App Store Connect API key for the "Request Test Notification" button.
      # Set these in the Render dashboard (sync:false keeps them out of git).
      - key: ASC_KEY_ID
        sync: false
      - key: ASC_ISSUER_ID
        sync: false
      - key: ASC_PRIVATE_KEY
        sync: false
      # APNs auth key for sending push notifications (the "Send notification"
      # dashboard button). Separate .p8 from the App Store Connect key above.
      - key: APNS_KEY_ID
        sync: false
      - key: APNS_TEAM_ID
        sync: false
      - key: APNS_PRIVATE_KEY
        sync: false
      # "sandbox" for dev/TestFlight-debug builds, "production" for App Store.
      - key: APNS_ENVIRONMENT
        value: sandbox
