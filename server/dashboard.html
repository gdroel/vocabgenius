<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>App Store Notifications</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #2f81f7; --good: #3fb950;
    --sandbox: #d29922; --prod: #3fb950;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 18px 24px; border-bottom: 1px solid var(--border); background: var(--panel);
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header .spacer { flex: 1; }
  .meta { color: var(--muted); font-size: 13px; }
  select, button {
    border-radius: 6px; padding: 8px 14px; font-size: 14px; font-weight: 600;
    border: 1px solid var(--border); background: #21262d; color: var(--text); cursor: pointer;
  }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button:disabled { opacity: .55; cursor: default; }
  #status { margin: 0 24px; padding: 10px 14px; border-radius: 6px; display: none;
            font-size: 13px; white-space: pre-wrap; }
  #status.show { display: block; }
  #status.ok { background: #14301c; color: var(--good); }
  #status.err { background: #3a1d1d; color: #f85149; }
  main { padding: 16px 24px 60px; }
  .empty { color: var(--muted); padding: 40px 0; text-align: center; }
  .card {
    border: 1px solid var(--border); border-radius: 8px; background: var(--panel);
    padding: 12px 16px; margin-bottom: 10px;
  }
  .card .top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .card .type { font-weight: 700; }
  .card .sub { color: var(--muted); }
  .card .time { margin-left: auto; color: var(--muted); font-size: 12px; }
  .card .note { color: var(--accent); margin: 4px 0 8px; }
  .badge {
    font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 999px; border: 1px solid currentColor;
  }
  .badge.sandbox { color: var(--sandbox); }
  .badge.production { color: var(--prod); }
  .badge.unknown { color: var(--muted); }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 2px 18px; font-size: 13px;
  }
  .grid div span { color: var(--muted); margin-right: 6px; }
  code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
</style>
</head>
<body>
<header>
  <h1>🛎️ App Store Server Notifications</h1>
  <span class="meta" id="count">0 events</span>
  <div class="spacer"></div>
  <label class="meta">show
    <select id="filter" onchange="render(lastEvents)">
      <option value="all">all</option>
      <option value="Sandbox">sandbox</option>
      <option value="Production">production</option>
    </select>
  </label>
  <button onclick="requestTest('Sandbox')" id="btnSandbox">Test · Sandbox</button>
  <button class="primary" onclick="requestTest('Production')" id="btnProd">Test · Production</button>
</header>
<div id="status"></div>
<main>
  <div id="feed"><div class="empty">Waiting for notifications…</div></div>
</main>

<script>
const statusEl = document.getElementById('status');
const feedEl = document.getElementById('feed');
const countEl = document.getElementById('count');
const filterEl = document.getElementById('filter');
const buttons = [document.getElementById('btnSandbox'), document.getElementById('btnProd')];
let lastEvents = [];

function showStatus(msg, ok) {
  statusEl.textContent = msg;
  statusEl.className = 'show ' + (ok ? 'ok' : 'err');
}

async function requestTest(env) {
  buttons.forEach(b => b.disabled = true);
  showStatus('Requesting a ' + env + ' TEST notification from Apple…', true);
  try {
    const res = await fetch('/request-test?env=' + encodeURIComponent(env), { method: 'POST' });
    const data = await res.json();
    if (res.ok) {
      showStatus('✅ Apple accepted the ' + env + ' request.\n' +
                 'A TEST event should appear in the feed below within a few seconds.\n' +
                 'testNotificationToken: ' + (data.testNotificationToken || '(none)'), true);
    } else {
      showStatus('❌ ' + (data.error || 'Request failed') +
                 (data.detail ? '\n' + data.detail : ''), false);
    }
  } catch (e) {
    showStatus('❌ Could not reach the server: ' + e.message, false);
  } finally {
    buttons.forEach(b => b.disabled = false);
  }
}

const ROWS = [
  ['product', 'product'], ['price', 'price'], ['expires', 'expires'],
  ['transactionId', 'txn'], ['originalTransactionId', 'orig txn'],
  ['autoRenew', 'auto-renew'], ['bundleId', 'bundle'], ['revokeReason', 'revoke reason'],
];

function fmtTime(iso) {
  try { return new Date(iso).toLocaleString(); } catch { return iso; }
}

function envClass(env) {
  if (env === 'Sandbox') return 'sandbox';
  if (env === 'Production') return 'production';
  return 'unknown';
}

function render(events) {
  lastEvents = events;
  const want = filterEl.value;
  const shown = want === 'all' ? events : events.filter(e => e.environment === want);
  countEl.textContent = shown.length + (shown.length === 1 ? ' event' : ' events') +
                        (want === 'all' ? '' : ' · ' + want.toLowerCase());
  if (!shown.length) {
    feedEl.innerHTML = '<div class="empty">No matching notifications yet…</div>';
    return;
  }
  feedEl.innerHTML = shown.map(e => {
    const fields = ROWS.filter(([k]) => e[k] !== null && e[k] !== undefined && e[k] !== '')
      .map(([k, label]) => `<div><span>${label}</span><code>${escape(e[k])}</code></div>`).join('');
    const env = e.environment || 'Unknown';
    return `<div class="card">
      <div class="top">
        <span class="badge ${envClass(env)}">${escape(env)}</span>
        <span class="type">${e.icon || ''} ${escape(e.type)}</span>
        ${e.subtype ? `<span class="sub">/ ${escape(e.subtype)}</span>` : ''}
        <span class="time">${fmtTime(e.received_at)}</span>
      </div>
      ${e.note ? `<div class="note">→ ${escape(e.note)}</div>` : ''}
      <div class="grid">${fields}</div>
    </div>`;
  }).join('');
}

function escape(v) {
  return String(v).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

async function poll() {
  try {
    const res = await fetch('/events');
    render(await res.json());
  } catch (e) { /* keep last render on transient errors */ }
}

poll();
setInterval(poll, 3000);
</script>
</body>
</html>
